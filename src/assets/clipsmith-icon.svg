<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- ClipSmith app mark: the iOS trim-handle frame in the violet brand gradient
       around a cyan filmstrip (the clip being cut), on a near-black squircle.
       A sibling to GifSmith (same trim frame + colors) but its own glyph: a
       filmstrip instead of a play triangle. Pure shapes, no fonts. -->
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c6acff"/>
      <stop offset="0.5" stop-color="#a974ff"/>
      <stop offset="1" stop-color="#8a4dff"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="#0a0a0a"/>

  <!-- selection rails (top + bottom) -->
  <rect x="250" y="312" width="524" height="30" fill="url(#violet)"/>
  <rect x="250" y="682" width="524" height="30" fill="url(#violet)"/>

  <!-- trim handles (left + right) with grip notches -->
  <rect x="250" y="312" width="84" height="400" rx="18" fill="url(#violet)"/>
  <rect x="690" y="312" width="84" height="400" rx="18" fill="url(#violet)"/>
  <rect x="288" y="462" width="8" height="100" rx="4" fill="#0a0a0a"/>
  <rect x="728" y="462" width="8" height="100" rx="4" fill="#0a0a0a"/>

  <!-- filmstrip (cyan accent): the clip, with sprocket holes top and bottom -->
  <rect x="370" y="420" width="284" height="184" rx="22" fill="#45f2f2"/>
  <g fill="#0a0a0a">
    <rect x="404" y="434" width="30" height="16" rx="4"/>
    <rect x="466" y="434" width="30" height="16" rx="4"/>
    <rect x="528" y="434" width="30" height="16" rx="4"/>
    <rect x="590" y="434" width="30" height="16" rx="4"/>
    <rect x="404" y="574" width="30" height="16" rx="4"/>
    <rect x="466" y="574" width="30" height="16" rx="4"/>
    <rect x="528" y="574" width="30" height="16" rx="4"/>
    <rect x="590" y="574" width="30" height="16" rx="4"/>
  </g>
</svg>
