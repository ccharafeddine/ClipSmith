name: ci

# Fast checks on every push/PR to master: frontend type-check + tests + build,
# and Rust fmt + clippy + tests. Full installer builds happen separately in
# release.yml on a v* tag. The Rust checks don't bundle, so they don't need the
# ffmpeg/yt-dlp sidecars (those are only resolved by the Tauri CLI at bundle
# time), which keeps this job cheap on a plain Ubuntu runner.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 Linux build dependencies (needed to compile the crate).
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test
