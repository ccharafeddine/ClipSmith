name: release

# Build installers and publish a draft GitHub Release when a v* tag is pushed.
# Produces a .dmg (Apple Silicon + Intel) and a .msi (Windows x64). FFmpeg/ffprobe
# sidecars are GPL (bundle libx264 for H.264 re-encode): downloaded prebuilt on
# Windows, compiled from source with --enable-gpl --enable-libx264 (static x264)
# on macOS. See CLAUDE.md and LICENSE.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-13 # Intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      # Sidecars must exist before the Tauri bundle step resolves externalBin.
      - name: Fetch FFmpeg sidecars (Windows, GPL static prebuilt with libx264)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/fetch-ffmpeg.sh

      - name: Build FFmpeg sidecars (macOS, GPL + static libx264 from source)
        if: runner.os == 'macOS'
        run: |
          brew install nasm
          bash scripts/build-ffmpeg-macos.sh

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClipSmith ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
