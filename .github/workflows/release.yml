name: release

# Build installers and publish a draft GitHub Release when a v* tag is pushed.
# Produces one universal .dmg (Apple Silicon + Intel, built on the arm64 runner)
# and a .msi (Windows x64). FFmpeg/ffprobe sidecars are GPL (bundle libx264 for
# H.264 re-encode): downloaded prebuilt on Windows, compiled from source with
# --enable-gpl --enable-libx264 (static x264, both arches lipo'd) on macOS.
# See CLAUDE.md and LICENSE.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal macOS .dmg built on the Apple Silicon runner (arm64
          # native + x86_64 cross). Avoids the scarce, deprecated macos-13 Intel
          # runner entirely (it tends to sit queued forever).
          - platform: macos-14
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            tauriTarget: universal-apple-darwin
          - platform: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            tauriTarget: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      # Sidecars must exist before the Tauri bundle step resolves externalBin.
      - name: Fetch FFmpeg sidecars (Windows, GPL static prebuilt with libx264)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/fetch-ffmpeg.sh

      - name: Build FFmpeg sidecars (macOS, GPL + static libx264 from source)
        if: runner.os == 'macOS'
        run: |
          brew install nasm
          bash scripts/build-ffmpeg-macos.sh

      # yt-dlp sidecar (URL import) is in externalBin too, so the bundle step
      # fails without it. The script picks the right binary per host triple.
      - name: Fetch yt-dlp sidecar
        shell: bash
        run: bash scripts/fetch-ytdlp.sh

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClipSmith ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.tauriTarget }}
